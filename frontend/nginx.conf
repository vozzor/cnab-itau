server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://SEU-BACKEND.run.app/;
        proxy_set_header Host SEU-BACKEND.run.app;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
